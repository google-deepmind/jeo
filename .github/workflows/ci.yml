name: CI & CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the project with test dependencies
          # Ensure your pyproject.toml has an optional-dependency group like [test] or [dev]
          # Example: pip install .[dev]
          pip install .[dev]

      - name: Run tests
        run: python -m pytest jeo/tests

  deploy-docs:
    # This file configures the GitHub Actions workflow for the automatic deployment of docs.
    # The content is based on: https://squidfunk.github.io/mkdocs-material/publishing-your-site/
    # More about Github Actions: https://docs.github.com/en/actions

    # Only deploy docs if tests passed.
    needs: run-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v5
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force --clean --remote-branch gh-pages
